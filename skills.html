<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Skills</title>

		<link rel="stylesheet" href="./css/style.css" />
		<link rel="stylesheet" href="./css/skills.css" />
		<link rel="stylesheet" href="./css/game-ui.css" />
	</head>

	<body data-page="skills">
		<div class="page">
			<div id="header"></div>

			<img src="./assets/background.png" alt="" class="background" />

			<main class="content">
				<section class="skills">
					<!-- 資格 -->
					<section class="skills-section">
						<h2 class="section-title">CERTIFICATION</h2>

						<div class="cert-grid">
							<div class="cert-card">
								<img src="./assets/Salesforce.png" alt="資格1" />
								<p>Salesforce Admin</p>
							</div>

							<div class="cert-card">
								<img src="./assets/ga.png" alt="資格2" />
								<p>Google Analytics</p>
							</div>
						</div>
					</section>

					<!-- 修了・合格など -->
					<section class="skills-section">
						<h2 class="section-title">TRAINING</h2>

						<div class="mini-grid">
							<div class="mini-card">
								<img src="./assets/wonderlabo.png" alt="" />
								<div class="mini-text">
									<p>職業訓練</p>
								</div>
							</div>

							<div class="mini-card">
								<img src="./assets/ai-passport.png" alt="" />
								<div class="mini-text">
									<p>生成AIパスポート</p>
								</div>
							</div>

							<div class="mini-card">
								<img src="./assets/PremirePro.png" alt="" />
								<div class="mini-text">
									<p>クリエイティブカレッジ</p>
								</div>
							</div>
						</div>
					</section>

					<!-- スキル -->
					<section class="skills-section">
						<h2 class="section-title">SKILLS</h2>

						<div class="skill-list">
							<div class="skill-item">
								<span class="skill-name">HTML</span>
								<div class="skill-bar">
									<div class="skill-level" style="width: 80%"></div>
								</div>
							</div>

							<div class="skill-item">
								<span class="skill-name">CSS</span>
								<div class="skill-bar">
									<div class="skill-level" style="width: 70%"></div>
								</div>
							</div>

							<div class="skill-item">
								<span class="skill-name">JavaScript</span>
								<div class="skill-bar">
									<div class="skill-level" style="width: 50%"></div>
								</div>
							</div>

							<div class="skill-item">
								<span class="skill-name">PHP</span>
								<div class="skill-bar">
									<div class="skill-level" style="width: 40%"></div>
								</div>
							</div>
						</div>
					</section>

					<!-- ツール -->
					<section class="skills-section">
						<h2 class="section-title">使用可能ツール</h2>

						<div class="tag-list">
							<span class="tag">VS Code</span>
							<span class="tag">Photoshop</span>
							<span class="tag">PremirePro</span>
							<span class="tag">Illustrator</span>
							<span class="tag">Figma</span>
							<span class="tag">STUDIO</span>
						</div>
					</section>
				</section>
			</main>

			<div id="footer"></div>
		</div>

		<script src="./js/layout.js"></script>
	</body>
</html>
