<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Portfolio Home</title>

		<link rel="stylesheet" href="./css/style.css" />
		<link rel="stylesheet" href="./css/home.css" />
	</head>

	<body>
		<img src="./assets/background.png" alt="" class="background" />

		<div class="game-wrapper">
			<div class="game-world">
				<div class="sign works-sign">
					<img src="./assets/sign.png" alt="" />
					<span>Works</span>
				</div>

				<div class="sign about-sign">
					<img src="./assets/sign.png" alt="" />
					<span>About</span>
				</div>

				<div class="sign skills-sign">
					<img src="./assets/sign.png" alt="" />
					<span>Skills</span>
				</div>

				<div class="sign contact-sign">
					<img src="./assets/sign.png" alt="" />
					<span>Contact</span>
				</div>

				<a href="about.html" class="house">
					<img src="./assets/house.png" alt="About" />
					<div class="hit-area house-hit"></div>
				</a>

				<a href="works.html" class="castle">
					<img src="./assets/castle.png" alt="Works" />
					<div class="hit-area castle-hit"></div>
				</a>

				<a href="skills.html" class="skill-tree">
					<img src="./assets/skill-tree.png" alt="Skills" />
					<div class="hit-area skill-tree-hit"></div>
				</a>

				<a href="contact.html" class="mailbox">
					<img src="./assets/mailbox.png" alt="Contact" />
					<div class="hit-area mailbox-hit"></div>
				</a>

				<div class="player">
					<img src="./assets/player_idle.png" />
				</div>

				<div class="player-speech">
					WASD to move<br />
					Click buildings
				</div>
			</div>
		</div>

		<script src="./js/main.js"></script>
	</body>
</html>
